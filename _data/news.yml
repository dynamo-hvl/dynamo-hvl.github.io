- date: 03 Nov 2025
  headline: First PhD student recruited to strengthen robotics research at HVL Haugesund.
  description: This marks an important step in building research capacity in automation and robotics at the Haugesund campus.

- date: 08 Mar 2026
  headline: Dr. Naseem Ali joins as a visiting researcher from Helmholtz-Zentrum Hereon for a three-month collaboration on offshore energy systems, supported by the HiDA mobility program.
  description: The collaboration focuses on extending the iSeaPower decision support system by integrating optimization and discrete event simulation methods for offshore operation and maintenance planning.
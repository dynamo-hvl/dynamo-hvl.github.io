
- date: 18 Mar 2025
  headline: Bouvet donates a KUKA robotic arm to support robotics research and education at HVL Haugesund.
  description: The donated robotic system will be used for hands-on student projects and research in automation, control, and intelligent robotic systems, strengthening collaboration between industry and academia.
